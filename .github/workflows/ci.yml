name: Conexão CI - .NET & Docker

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    # Instala o SDK do .NET 10
    - name: Configurar o .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # Correção aqui: Dizemos ao robô para rodar a restauração olhando para a pasta do projeto
    - name: Restaurar pacotes
      run: dotnet restore
      working-directory: ./BibliotecaAPI

    # Dizemos ao robô para compilar direto de dentro da pasta do projeto
    - name: Compilar a aplicação (Build)
      run: dotnet build --no-restore --configuration Release
      working-directory: ./BibliotecaAPI

    # O teste do Dockerfile (esse continua rodando na raiz porque o contexto do Docker precisa ler tudo)
    - name: Testar build da Imagem Docker
      run: docker build -t biblioteca-api:test -f ./BibliotecaAPI/Dockerfile .